  { title:"基本计数原理", desc:"加法原理、乘法原理、捆绑法、容斥入门", qs:[

    {l:"★", q:"6 名运动员争夺金、银、铜牌，共有多少种结果？", a:"有序取 3：$P(6,3)=6\\times5\\times4 = 120$ 种。"},

    {l:"★★", q:"用 A,B,C,D,E 排成一列，要求 A 不在第一位、E 不在最后一位，有多少种？", a:"容斥：$5!-4!-4!+3! = 120-24-24+6 = 78$。"},
    {l:"★★", q:"将 “BANANA” 重新排列（相同字母无区别），有多少种不同排法？", a:"B·1, A·3, N·2：$\\dfrac{6!}{1!\\,3!\\,2!} = 60$。"},
    {l:"★★★", q:"8 个不同的珠子串成一条项链（旋转、翻转都等价），有多少种不同项链？", a:"项链数 $=\\dfrac{(8-1)!}{2} = \\dfrac{5040}{2} = 2520$。"}

  { title:"组合", desc:"组合数、补集法、双计数、不相邻选取", qs:[

    {l:"★★", q:"平面上 10 个点，任意三点不共线，可连多少条线段？可构成多少个三角形？", a:"线段 $\\binom{10}{2}=45$；三角形 $\\binom{10}{3}=120$。"},
    {l:"★★", q:"一副扑克 52 张中取 5 张，恰含 2 张 K 的取法有多少？", a:"$\\binom{4}{2}\\binom{48}{3}=6\\times17296 = 103776$。"},
    {l:"★★★", q:"从 1–20 中选 3 个不同的数，使它们两两之差都 $\\ge 2$（不相邻），有多少种？", a:"令 $a'=a,b'=b-1,c'=c-2$，则 $1\\le a'<b'<c'\\le18$，故 $\\binom{18}{3}=816$。"},
    {l:"★★★", q:"证明 $\\sum_{k=0}^{n}\\binom{n}{k}^2 = \\binom{2n}{n}$（组合解释）。", a:"从 $n$ 红 + $n$ 蓝共 $2n$ 个中取 $n$ 个：取 $k$ 红 $n-k$ 蓝有 $\\binom{n}{k}\\binom{n}{n-k}=\\binom{n}{k}^2$，求和 $=\\binom{2n}{n}$。"}
  ]},
  { title:"多重集与隔板法", desc:"非负/正整数解、可重组合、上界约束", qs:[

    {l:"★", q:"把 8 个相同的苹果分给 3 个小孩，每人至少 1 个，有多少种分法？", a:"每人先发 1 个，剩 5 个任意分：$\\binom{5+3-1}{2}=\\binom{7}{2} = 21$。"},
    {l:"★★", q:"方程 $x_1+x_2+x_3+x_4 = 15$，$x_i\\ge1$ 的正整数解有多少？", a:"令 $y_i=x_i-1$，$\\sum y_i=11$：$\\binom{11+3}{3}=\\binom{14}{3} = 364$。"},
    {l:"★★", q:"从苹果、香蕉、橙子三种水果中买 12 个（每种可不买），有多少种购买方案？", a:"可重组合：$\\binom{12+3-1}{2}=\\binom{14}{2} = 91$。"},
    {l:"★★", q:"“MISSISSIPPI” 的不同字母排列有多少种？", a:"M·1,I·4,S·4,P·2：$\\dfrac{11!}{1!\\,4!\\,4!\\,2!} = 34650$。"},
    {l:"★★★", q:"$x_1+x_2+x_3+x_4 = 20$，约束 $x_1\\le 6$，其余 $\\ge0$，有多少组解？", a:"总解 $\\binom{23}{3}=1771$；减 $x_1\\ge7$ 的 $\\binom{16}{3}=560$：$1771-560 = 1211$。"},

  ]},
  { title:"二项式定理与恒等式", desc:"展开系数、常数项、求和、Vandermonde", qs:[

    {l:"★", q:"求 $(2x-3y)^4$ 展开式中 $x^2y^2$ 项的系数。", a:"$\\binom{4}{2}(2)^2(-3)^2 = 6\\times4\\times9 = 216$。"},
    {l:"★★", q:"求 $\\left(x^2+\\dfrac{1}{x}\\right)^6$ 展开式中的常数项。", a:"通项 $\\binom{6}{k}x^{12-3k}$，令 $12-3k=0\\Rightarrow k=4$，常数项 $\\binom{6}{4}=15$。"},
    {l:"★★", q:"证明 $\\sum_{k}\\binom{n}{k} = 2^n$ 和 $\\sum_{k}(-1)^k\\binom{n}{k}=0$（$n\\ge1$）。", a:"在 $(1+x)^n=\\sum\\binom{n}{k}x^k$ 中令 $x=1$ 得 $2^n$；令 $x=-1$ 得 $0$。"},
    {l:"★★", q:"利用二项式定理求 $\\sum_{k=0}^{n}k\\binom{n}{k}$。", a:"对 $(1+x)^n$ 求导：$n(1+x)^{n-1}=\\sum k\\binom{n}{k}x^{k-1}$，令 $x=1$ 得 $n\\,2^{n-1}$。"},
    {l:"★★★", q:"证明 Vandermonde 恒等式 $\\sum_{k}\\binom{m}{k}\\binom{n}{r-k}=\\binom{m+n}{r}$。", a:"比较 $(1+x)^m(1+x)^n=(1+x)^{m+n}$ 两边 $x^r$ 的系数即得。"},
    {l:"★★★", q:"求 $\\sum_{k=0}^{n}\\binom{n}{k}\\dfrac{1}{k+1}$ 的闭式。", a:"$\\dfrac{1}{k+1}\\binom{n}{k}=\\dfrac{1}{n+1}\\binom{n+1}{k+1}$，求和 $=\\dfrac{2^{n+1}-1}{n+1}$。"}
  ]},
  { title:"鸽巢原理", desc:"构造盒子：余数、配对、奇偶、累计序列", qs:[

    {l:"★", q:"抽屉里有红、蓝、黄三色袜子，至少取多少只才能保证有 2 只同色？", a:"3 种颜色为盒，取 4 只必有 2 只同色（$3+1$）。"},
    {l:"★★", q:"从 1–100 中任取 51 个数，证明必有两个数互质。", a:"按相邻配对 $\\{1,2\\},\\dots,\\{99,100\\}$ 共 50 对，取 51 个必有一对相邻，相邻整数互质。"},
    {l:"★★", q:"从 1–8 中任取 5 个数，证明必有两个之和为 9。", a:"配对 $\\{1,8\\},\\{2,7\\},\\{3,6\\},\\{4,5\\}$ 共 4 盒，取 5 个必有一对同盒，其和为 9。"},
    {l:"★★", q:"证明任意 $n+1$ 个不超过 $2n$ 的正整数中，必有一个整除另一个。", a:"每数写成 $2^a\\cdot m$（$m$ 奇）。$1\\sim2n$ 中奇数仅 $n$ 个为盒，$n+1$ 个数必有两个同 $m$，其一整除另一。"},
    {l:"★★★", q:"平面上任取 5 个整点，证明必有两点的中点也是整点。", a:"按坐标奇偶 $(奇/偶)\\times(奇/偶)$ 共 4 类，5 点必有 2 点同类，坐标同奇偶 ⇒ 中点为整点。"},

    {l:"★★", q:"求欧拉函数 $\\varphi(60)$，并写出推导。", a:"$60=2^2\\cdot3\\cdot5$，$\\varphi(60)=60\\cdot\\tfrac12\\cdot\\tfrac23\\cdot\\tfrac45 = 16$。"},

    {l:"★★", q:"解递推 $a_n=5a_{n-1}-6a_{n-2}$，$a_0=1,a_1=0$。", a:"特征根 $2,3$，$a_n=A2^n+B3^n$；代入得 $A=3,B=-2$，$a_n=3\\cdot2^n-2\\cdot3^n$。"},

    {l:"★★", q:"凸六边形有多少种三角剖分？用 Catalan 数验证。", a:"$(6-2)=4$，三角剖分数 $=C_4=14$。"},
    {l:"★★", q:"求把 4 个不同的球放入 2 个无区别非空盒子的方法数 $S(4,2)$。", a:"$S(4,2)=\\frac{1}{2}(2^4-\\binom{2}{1}1^4)=\\frac12(16-2)=7$。"},
    {l:"★★", q:"求 Bell 数 $B_4$（集合 $\\{1,2,3,4\\}$ 的划分总数）。", a:"$B_4=S(4,1)+\\cdots+S(4,4)=1+7+6+1 = 15$。"},
    {l:"★★★", q:"求整数 6 的所有划分 $p(6)$，并列举。", a:"$p(6)=11$：$6;5{+}1;4{+}2;4{+}1{+}1;3{+}3;3{+}2{+}1;3{+}1{+}1{+}1;2{+}2{+}2;2{+}2{+}1{+}1;2{+}1{+}1{+}1{+}1;1{\\times}6$。"},
    {l:"★★★", q:"证明 $n$ 分成互不相同部分的划分数 = 分成奇数部分的划分数（以 $n=5$ 验证）。", a:"$n=5$：互异 $\\{5\\},\\{4,1\\},\\{3,2\\}$ 共 3 个；奇数 $\\{5\\},\\{3,1,1\\},\\{1^5\\}$ 共 3 个。一般由 $\\prod(1+x^k)=\\prod\\frac{1}{1-x^{2k-1}}$ 证。"}
  ]},
  { title:"Pólya 计数 / 图论 / 综合", desc:"完全图、树、Burnside、Cayley、Ramsey", qs:[
    {l:"★", q:"$K_5$（5 个顶点的完全图）有多少条边？", a:"$\\binom{5}{2}=10$ 条。"},
    {l:"★", q:"一棵有 10 个顶点的树有多少条边？", a:"树有 $n-1=9$ 条边。"},
    {l:"★★", q:"用 2 种颜色给正三角形 3 顶点染色，旋转等价下有多少种本质不同染色（Burnside）？", a:"旋转群 $\\{e,r,r^2\\}$ 不动点 $8,2,2$，Burnside $\\frac{1}{3}(8+2+2)=4$ 种。"},
    {l:"★★", q:"用 $m$ 种颜色给正方形 4 顶点染色，仅旋转群 $C_4$ 作用，求本质不同染色数公式。", a:"轮换数 $4,1,2,1$：$N=\\frac{1}{4}(m^4+m+m^2+m)=\\frac{m^4+m^2+2m}{4}$。"},
    {l:"★★", q:"证明 $R(3,3)\\le 6$：6 人聚会必有 3 人互识或 3 人互不识。", a:"取一人 $A$，其余 5 人由鸽巢必有 3 人与 $A$ 同类（设都认识 $A$）。这 3 人中若有 2 人互识则与 $A$ 成互识三角，否则三人互不识。"},
    {l:"★★★", q:"4 个有标号顶点的生成树有多少棵（Cayley 公式）？列举验证 $n=3$。", a:"$n^{n-2}=4^2=16$ 棵；$n=3$：$3^1=3$ 棵。"},
    {l:"★★★", q:"用红蓝两色对 $K_6$ 的边染色，证明必出现单色三角形。", a:"$A$ 引出 5 条边两色，必有 3 条同色（设红）连到 $B,C,D$。若 $BC,BD,CD$ 有一条红则成红三角，否则三条全蓝成蓝三角。"}
  ]}
];

const tabsEl = document.getElementById('tabs');
const wrapEl = document.getElementById('wrap');
let current = 0;
const doneSet = new Set();

PAGES.forEach((p, i) => {
  const t = document.createElement('div');
  t.className = 'tab' + (i === 0 ? ' active' : '');
  t.id = 'tab-' + i;
  t.textContent = 'P' + (i + 1);
  t.onclick = () => goPage(i);
  tabsEl.appendChild(t);
});

PAGES.forEach((p, i) => {
  const page = document.createElement('div');
  page.className = 'page' + (i === 0 ? ' active' : '');
  page.id = 'page-' + i;
  let html = `<h2 class="page-title"><span class="pgnum">第 ${i+1} 页</span>${p.title}</h2>`;
  html += `<p class="page-desc">${p.desc}　·　${p.qs.length} 题</p>`;
  p.qs.forEach((qq, j) => {
    html += `<div class="q"><div class="q-head"><div class="q-num">${j+1}</div><div class="q-body">`;
    html += `<div class="q-stem">${qq.q}<span class="lvl">${qq.l}</span></div>`;
    html += `<button class="toggle" onclick="toggleAns(${i},${j})">💡 显示答案</button>`;
    html += `<div class="answer" id="ans-${i}-${j}"><span class="lbl">参考答案</span>${qq.a}</div>`;
    html += `</div></div></div>`;
  });
  html += `<div class="pager"><button onclick="goPage(${i-1})" ${i===0?'disabled':''}>← 上一页</button>`;
  html += `<button onclick="markDone(${i})" style="border-color:var(--ok);color:var(--ok)">✓ 标记本页完成</button>`;
  html += `<button onclick="goPage(${i+1})" ${i===PAGES.length-1?'disabled':''}>下一页 →</button></div>`;
  page.innerHTML = html;
  wrapEl.appendChild(page);
});

function goPage(i) {
  if (i < 0 || i >= PAGES.length) return;
  document.getElementById('page-' + current).classList.remove('active');
  document.getElementById('tab-' + current).classList.remove('active');
  current = i;
  document.getElementById('page-' + current).classList.add('active');
  document.getElementById('tab-' + current).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function toggleAns(i, j) {
  document.getElementById(`ans-${i}-${j}`).classList.toggle('show');
}
let allShown = false;
function toggleAll() {
  allShown = !allShown;
  document.querySelectorAll('.answer').forEach(a => a.classList.toggle('show', allShown));
  document.getElementById('allBtn').textContent = allShown ? '🙈 隐藏全部答案' : '👁 显示全部答案';
}
function markDone(i) {
  doneSet.add(i);
  document.getElementById('tab-' + i).classList.add('done');
  document.getElementById('prog').style.width = (doneSet.size / PAGES.length * 100) + '%';
  if (i < PAGES.length - 1) goPage(i + 1);
}
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') goPage(current - 1);
  if (e.key === 'ArrowRight') goPage(current + 1);
});
</script>
</body>
</html>
