<style>

<script>
/* ============================================================
   题库数据：10 页，每页约 7 题
   type: 题型；stem: 题干(HTML)；ans: 答案(HTML)
   ============================================================ */
const PAGES = [
  {
    title: "第 1 页 · 命题逻辑基础",
    tag: "第1讲 · 命题 / 联结词 / 真值表 / 合式公式",
    questions: [
      { type:"判断", stem:`下列哪些是命题？为每句判断真假或说明原因：<br>① <code>2+2=3</code> ② “华盛顿是美国首都” ③ “请关门！” ④ “x&gt;3” ⑤ “我正在说假话”`,
        ans:`①是命题（假）；②是命题（真）；③祈使句，<b>不是</b>命题；④含自由变量 x，真假不定，<b>不是</b>命题；⑤悖论，<b>不是</b>命题。<div class="why">命题须是能唯一确定真假的陈述句。</div>` },
      { type:"真值表", stem:`写出 <code>P→Q</code> 的真值表，并指出它何时为假。`,
        ans:`<table class="tt"><tr><th>P</th><th>Q</th><th>P→Q</th></tr><tr><td>T</td><td>T</td><td>T</td></tr><tr><td>T</td><td>F</td><td>F</td></tr><tr><td>F</td><td>T</td><td>T</td></tr><tr><td>F</td><td>F</td><td>T</td></tr></table><p class="why">仅当 P=T 且 Q=F 时为假，其余皆真。</p>` },
      { type:"优先级", stem:`按联结词优先级为下式加全部括号：<code>¬P ∨ Q ∧ R → S</code>`,
        ans:`优先级 <code>¬ &gt; ∧ &gt; ∨ &gt; → &gt; ↔</code>，故为 <code>((¬P) ∨ (Q ∧ R)) → S</code>。` },
      { type:"分类", stem:`判断下列公式属于永真式 / 永假式 / 可满足式：<br>① <code>P ∨ ¬P</code> ② <code>P ∧ ¬P</code> ③ <code>P → Q</code>`,
        ans:`①永真式（重言式）；②永假式（矛盾式）；③可满足式（非永真非永假，如 P=F 时为真）。` },
      { type:"合式公式", stem:`下列哪些是合式公式（wff）？<br>① <code>(P∧Q)</code> ② <code>¬¬P</code> ③ <code>P∧∨Q</code> ④ <code>(P→(Q∨R))</code>`,
        ans:`①②④ 是 wff；③ <code>P∧∨Q</code> 连用两个二元联结词，<b>不是</b> wff。` },
      { type:"符号化", stem:`将“只有努力学习，才能通过考试”符号化（P：努力学习；Q：通过考试）。`,
        ans:`“只有 P 才 Q”即 P 是 Q 的必要条件：<code>Q → P</code>（等价 <code>¬P → ¬Q</code>）。<div class="why">区别于“只要 P 就 Q”= <code>P→Q</code>。</div>` },
      { type:"异或", stem:`用真值表说明 <code>P ⊕ Q</code> 与 <code>¬(P ↔ Q)</code> 等值。`,
        ans:`两者真值表完全相同：仅当 P、Q 真值不同时为 T。故 <code>P⊕Q ⇔ ¬(P↔Q)</code>。` },
    ]
  },
  {
    title: "第 2 页 · 等值式与等值演算",
    tag: "第2讲 · 24 个等值式 / 化归 / 等值证明",
    questions: [
      { type:"化归", stem:`化简并仅用 <code>¬, ∧, ∨</code> 表示：<code>P → (Q → P)</code>`,
        ans:`<code>P→(Q→P) ⇔ ¬P ∨ (¬Q ∨ P) ⇔ ¬P ∨ P ∨ ¬Q ⇔ T</code>。该式为<b>永真式</b>。` },
      { type:"等值演算", stem:`证明 <code>P → (Q∧R)</code> ⇔ <code>(P→Q) ∧ (P→R)</code>。`,
        ans:`左 = <code>¬P∨(Q∧R)</code>；由分配律 = <code>(¬P∨Q)∧(¬P∨R)</code> = <code>(P→Q)∧(P→R)</code> = 右。证毕。` },
      { type:"德摩根", stem:`化简 <code>¬(P ∨ (¬P ∧ Q))</code>。`,
        ans:`<code>¬(P∨(¬P∧Q)) ⇔ ¬P ∧ ¬(¬P∧Q) ⇔ ¬P ∧ (P∨¬Q) ⇔ (¬P∧P)∨(¬P∧¬Q) ⇔ ¬P∧¬Q</code>。` },
      { type:"吸收律", stem:`化简 <code>(P∧Q) ∨ (P∧¬Q) ∨ (¬P∧Q)</code>。`,
        ans:`前两项 = <code>P∧(Q∨¬Q) = P</code>；故原式 = <code>P ∨ (¬P∧Q) = P∨Q</code>（用 <code>P∨(¬P∧Q)=P∨Q</code>）。` },
      { type:"逆否", stem:`写出 <code>P → ¬Q</code> 的逆否命题，并说明二者关系。`,
        ans:`逆否命题为 <code>Q → ¬P</code>。逆否等价：<code>P→¬Q ⇔ ¬(¬Q)→¬P ⇔ Q→¬P</code>，二者恒等值。` },
      { type:"等价化归", stem:`将 <code>P ↔ Q</code> 用两种不同方式展开。`,
        ans:`① <code>(P→Q)∧(Q→P)</code>；② <code>(P∧Q)∨(¬P∧¬Q)</code>。两者都等值于 <code>P↔Q</code>。` },
      { type:"判定", stem:`判断 <code>(P→Q) → (¬Q→¬P)</code> 是否永真。`,
        ans:`<code>¬Q→¬P ⇔ P→Q</code>，故整式 = <code>(P→Q)→(P→Q) ⇔ T</code>，<b>永真式</b>。` },
    ]
  },
  {
    title: "第 3 页 · 重言蕴涵与推理",
    tag: "第2讲 · MP / MT / HS / 析取三段论 / CP 规则",
    questions: [
      { type:"推理", stem:`用推理规则证明：前提 <code>P→Q, Q→R, P</code>，结论 <code>R</code>。`,
        ans:`<pre>(1) P        P
(2) P→Q      P
(3) Q        T(1)(2) MP
(4) Q→R      P
(5) R        T(3)(4) MP</pre>` },
      { type:"析取三段论", stem:`已知 <code>P∨Q</code> 与 <code>¬P</code>，可推出什么？写出规则名。`,
        ans:`推出 <code>Q</code>。规则：<b>析取三段论</b> <code>¬P∧(P∨Q) ⇒ Q</code>。` },
      { type:"拒取式", stem:`已知 <code>P→Q</code> 与 <code>¬Q</code>，结论是？`,
        ans:`<code>¬P</code>。规则：<b>拒取式 MT</b>，<code>¬Q∧(P→Q) ⇒ ¬P</code>。` },
      { type:"CP规则", stem:`用 CP（条件论证）证明：前提 <code>P→(Q→R)</code>，结论 <code>(P∧Q)→R</code>。`,
        ans:`<pre>(1) P∧Q      P(附加前提)
(2) P        T(1) 化简
(3) Q        T(1) 化简
(4) P→(Q→R)  P
(5) Q→R      T(2)(4) MP
(6) R        T(3)(5) MP
(7) (P∧Q)→R  CP(1)(6)</pre>` },
      { type:"构造性二难", stem:`已知 <code>P∨Q</code>、<code>P→R</code>、<code>Q→R</code>，结论？`,
        ans:`<code>R</code>。规则：<b>构造性二难</b> <code>(P∨Q)∧(P→R)∧(Q→R) ⇒ R</code>。` },
      { type:"应用题", stem:`两扇门一生一死，两名守卫一真一假。只能问一个问题，如何确定生门？`,
        ans:`问任一守卫：“如果我问另一位‘这是生门吗’，他会说‘是’吗？”——回答“是”则此门为死门，回答“否”则为生门。<div class="why">本质是用一真一假构造异或，两次取反抵消。</div>` },
      { type:"判定有效性", stem:`论证“若下雨则地湿；地湿；所以下雨”是否有效？`,
        ans:`<b>无效</b>。这是肯定后件谬误：<code>(P→Q)∧Q</code> 不能推出 P（地湿可能由别的原因造成）。` },
    ]
  },
  {
    title: "第 4 页 · 范式",
    tag: "第3讲 · 析取/合取范式 · 主析取/主合取范式",
    questions: [
      { type:"析取范式", stem:`求 <code>P → (Q ∧ R)</code> 的析取范式。`,
        ans:`<code>¬P ∨ (Q∧R)</code> 即为析取范式（两个合取式的析取）。` },
      { type:"合取范式", stem:`求 <code>(P∧Q) ∨ R</code> 的合取范式。`,
        ans:`由分配律：<code>(P∨R) ∧ (Q∨R)</code>。` },
      { type:"主析取范式", stem:`求 <code>P → Q</code> 的主析取范式（以小项表示）。`,
        ans:`真值为 T 的赋值：(0,0)(0,1)(1,1)。<br>主析取范式 = <code>m₀₀ ∨ m₀₁ ∨ m₁₁ = (¬P∧¬Q) ∨ (¬P∧Q) ∨ (P∧Q)</code>。` },
      { type:"主合取范式", stem:`求 <code>P → Q</code> 的主合取范式（以大项表示）。`,
        ans:`真值为 F 的赋值：(1,0)。<br>主合取范式 = <code>M₁₀ = ¬P ∨ Q</code>。` },
      { type:"互补关系", stem:`若一个含 2 个变元的公式主析取范式有 3 个小项，主合取范式有几个大项？`,
        ans:`共 <code>2²=4</code> 个极小项位置。小项占 3 个 → 大项占 <code>4−3 = 1</code> 个。<div class="why">小项对应真行，大项对应假行，二者互补。</div>` },
      { type:"主范式应用", stem:`若某公式主析取范式包含全部 <code>2ⁿ</code> 个小项，该公式是？`,
        ans:`<b>永真式</b>（重言式）。相应地，主合取范式为空（无大项）。` },
      { type:"完备集", stem:`下列哪些是极小联结词完备集？<br>① <code>{¬,∧}</code> ② <code>{∧,∨}</code> ③ <code>{↑}</code>（与非）④ <code>{→}</code>`,
        ans:`①③ 是完备集；④ 单独 <code>{→}</code> 不完备（缺否定能力）；② <code>{∧,∨}</code> 也不完备（无法表达否定）。常见完备集还有 <code>{¬,∨}</code>、<code>{¬,→}</code>、<code>{↓}</code>。` },
    ]
  },
  {
    title: "第 5 页 · 谓词逻辑（一阶逻辑）",
    tag: "第4讲 · 个体词 / 谓词 / 量词 / 前束范式",
    questions: [

/* ============================================================
   渲染与交互
   ============================================================ */
const pagesEl = document.getElementById('pages');
const tabsEl = document.getElementById('tabs');
const barEl = document.getElementById('bar');
let current = 0;
const done = new Array(PAGES.length).fill(false);

// 构建页面
PAGES.forEach((pg, i) => {
  const sec = document.createElement('section');
  sec.className = 'page' + (i === 0 ? ' active' : '');
  sec.dataset.idx = i;

  let qhtml = pg.questions.map((q, j) => `
    <div class="q">
      <div class="q-head">
        <div class="q-num">${j + 1}</div>
        <div class="q-body">
          <p class="stem">${q.stem}<span class="q-type">${q.type}</span></p>
          <button class="toggle" data-q="${i}-${j}"><span class="arr">▶</span> 查看答案</button>
          <div class="ans" id="ans-${i}-${j}">
            <div class="lbl">参考答案</div>
            ${q.ans}
          </div>
        </div>
      </div>
    </div>`).join('');

  sec.innerHTML = `
    <div class="page-head">
      <span class="pno">P${i + 1}/10</span>
      <h2>${pg.title}</h2>
      <span class="tag">${pg.tag}</span>
    </div>
    ${qhtml}
    <div class="page-foot">
      <button class="navbtn" data-nav="prev">← 上一页</button>
      <button class="navbtn" data-nav="next">下一页 →</button>
    </div>`;
  pagesEl.appendChild(sec);

  const tab = document.createElement('button');
  tab.className = 'tab' + (i === 0 ? ' active' : '');
  tab.dataset.idx = i;
  tab.innerHTML = `<span class="n">${i + 1}</span>`;
  tab.title = pg.title;
  tabsEl.appendChild(tab);
});

// 切页
function goTo(idx) {
  idx = Math.max(0, Math.min(PAGES.length - 1, idx));
  current = idx;
  document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', +p.dataset.idx === idx));
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', +t.dataset.idx === idx));
  window.scrollTo({ top: 0, behavior: 'smooth' });
  updateProgress();
}
function updateProgress() {
  const finished = done.filter(Boolean).length;
  barEl.style.width = (finished / PAGES.length * 100) + '%';
}

// 事件委托
tabsEl.addEventListener('click', e => {
  const t = e.target.closest('.tab');
  if (t) goTo(+t.dataset.idx);
});
pagesEl.addEventListener('click', e => {
  const tg = e.target.closest('.toggle');
  if (tg) {
    const ans = document.getElementById('ans-' + tg.dataset.q);
    const open = ans.classList.toggle('show');
    tg.classList.toggle('open', open);
    tg.querySelector('.arr').nextSibling.textContent = open ? ' 收起答案' : ' 查看答案';
    return;
  }
  const nav = e.target.closest('[data-nav]');
  if (nav) goTo(nav.dataset.nav === 'next' ? current + 1 : current - 1);
});

// 工具栏
document.getElementById('revealAll').addEventListener('click', () => {
  document.querySelector('.page.active').querySelectorAll('.ans').forEach(a => a.classList.add('show'));
  document.querySelector('.page.active').querySelectorAll('.toggle').forEach(t => {
    t.classList.add('open'); t.querySelector('.arr').nextSibling.textContent = ' 收起答案';
  });
});
document.getElementById('hideAll').addEventListener('click', () => {
  document.querySelector('.page.active').querySelectorAll('.ans').forEach(a => a.classList.remove('show'));
  document.querySelector('.page.active').querySelectorAll('.toggle').forEach(t => {
    t.classList.remove('open'); t.querySelector('.arr').nextSibling.textContent = ' 查看答案';
  });
});
document.getElementById('markDone').addEventListener('click', () => {
  done[current] = !done[current];
  document.querySelector(`.tab[data-idx="${current}"]`).classList.toggle('done', done[current]);
  updateProgress();
});
document.getElementById('resetAll').addEventListener('click', () => {
  done.fill(false);
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('done'));
  updateProgress();
});

// 键盘左右翻页
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') goTo(current + 1);
  if (e.key === 'ArrowLeft') goTo(current - 1);
});

updateProgress();
</script>
</body>
</html>
